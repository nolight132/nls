# nls user configuration.
#
# Linux/macOS: $XDG_CONFIG_HOME/nls/config.toml (or ~/.config/nls/config.toml)
# Windows:     %APPDATA%\nls\config.toml

# Columns shown in interactive table mode, in order.
# Omit a column to hide it; add one to enable it by default.
# Flags -i, -s, -l still append their columns if not listed here.
# Available: id, name, type, size, modified, accessed, changed,
#            permissions, links, owner, group, inode, blocks, git
default_columns = [
    "id",
    "name",
    "size",
    "modified",
]

# Enable Nerd Font icons by default. --no-icons still overrides.
[icons]
enabled = true

# Use filename/extension-specific icons, such as Go for go.mod or a key for .env.
# When false, enabled icons fall back to generic file/directory/executable icons.
special_icons = true

[dir_size]
# Estimate directory sizes by default in interactive table mode.
enabled = true

# Maximum walk depth per directory for default interactive estimates.
# 0 = unlimited depth, bounded by the timing preset unless timing = "unlimited".
default_depth = 0

# Time budget preset for default interactive estimates, shared across all
# directories of a listing: strict (8ms), balanced (20ms), relaxed (100ms),
# or unlimited. May take a while for very large directories when unlimited.
timing = "balanced"

[git]
# Color entry names by git state when the git column (-g) is shown:
# yellow = modified, green = untracked, gray = ignored.
color_entries = true

[render]
# Show symlink target names in table mode. '-l' overrides to always show.
expand_symlinks = false
