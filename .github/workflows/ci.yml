name: CI

on:
   push:
      branches: [main]
      paths:
         - "**.go"
         - "go.mod"
         - "go.sum"
         - ".github/workflows/ci.yml"
   pull_request:
      branches: [main]
      paths:
         - "**.go"
         - "go.mod"
         - "go.sum"
         - ".github/workflows/ci.yml"

permissions:
   contents: read

jobs:
   test:
      name: Test (${{ matrix.os }})
      runs-on: ${{ matrix.os }}
      strategy:
         fail-fast: false
         matrix:
            os: [ubuntu-latest, macos-latest, windows-latest]

      steps:
         - name: Checkout
           uses: actions/checkout@v5

         - name: Setup Go
           uses: actions/setup-go@v6
           with:
              go-version-file: go.mod
              cache: true

         - name: Download modules
           run: go mod download

         - name: Check formatting
           if: runner.os != 'Windows'
           run: test -z "$(gofmt -l .)"

         - name: Check formatting
           if: runner.os == 'Windows'
           shell: pwsh
           run: |
              $files = gofmt -l .
              if ($files) {
                $files
                exit 1
              }

         - name: Vet
           run: go vet ./...

         - name: Build
           run: go build -ldflags="-s -w" -o nls ./cmd/nls

         - name: Test
           run: go test ./...
